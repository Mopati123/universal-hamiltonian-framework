name: Update Meta Status Badge

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run meta self-validation and write shields JSON
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
            import json
            from src.meta.self_cicd import MetaFrameworkCICD
            m = MetaFrameworkCICD('.')
            res = m.run_evolution_cycle()
            # Build shields.io endpoint JSON
            if res.get('improved', False):
                message = "PASS"
                color = 'green'
            else:
                message = "WARN"
                color = 'orange'
            shields = {
                'schemaVersion': 1,
                'label': 'meta',
                'message': message,
                'color': color
            }
            print('Writing meta/meta_shields.json:', shields)
            with open('meta/meta_shields.json','w', encoding='utf-8') as f:
                json.dump(shields, f)
          PY

      - name: Commit and push meta status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meta/meta_shields.json || true
          if ! git diff --staged --quiet; then
            git commit -m "meta: update meta status badge"
            git push origin HEAD:main
          else
            echo "No changes to meta_shields.json"
          fi

      - name: Ensure meta labels exist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              { name: 'meta:passed', color: '0e8a16', description: 'Meta self-check passed' },
              { name: 'meta:review-needed', color: 'ff9f1c', description: 'Meta self-check requires human review' }
            ];
            const { data: existingLabels } = await github.rest.issues.listLabelsForRepo({ owner: context.repo.owner, repo: context.repo.repo });
            const existingNames = existingLabels.map(l => l.name);
            for (const label of labels) {
              if (!existingNames.includes(label.name)) {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name, color: label.color, description: label.description });
              }
            }