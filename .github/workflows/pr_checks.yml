name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR (style, tests, meta-self-check)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Formatting check (black)
      run: |
        black --check src/ tests/

    - name: Lint (ruff)
      run: |
        ruff check src/ tests/

    - name: Type check (mypy)
      run: |
        mypy src/ --ignore-missing-imports

    - name: Validate GitHub workflow YAML
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
        python scripts/validate_github_workflows.py

    - name: Run tests
      run: |
        pytest tests/ -q

    - name: Meta self-validation (non-blocking, produce artifact)
      id: meta_check
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: python scripts/run_meta_check.py


    - name: Comment meta self-validation result on PR (badge + labels)
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const resPath = 'meta_result.json';
          try {
            const raw = fs.readFileSync(resPath, 'utf8');
            const res = JSON.parse(raw);
            const improved = res.improved === true;
            const deltaE = res.delta_E;
            const badge = improved ? '✅ **PASS** (Delta-E < 0)' : '⚠️ **WARN** (Delta-E >= 0)';
            const body = `**Meta self-validation results**\n\n${badge}\n\n\`\`\`json\n${JSON.stringify(res, null, 2)}\n\`\`\``;

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            // Labels
            const passLabel = 'meta:passed';
            const reviewLabel = 'meta:review-needed';

            // Ensure labels exist (create if missing)
            const { data: existingLabels } = await github.rest.issues.listLabelsForRepo({ owner: context.repo.owner, repo: context.repo.repo });
            const existingNames = existingLabels.map(l => l.name);
            if (!existingNames.includes(passLabel)) {
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: passLabel, color: '0e8a16', description: 'Meta self-check passed' });
            }
            if (!existingNames.includes(reviewLabel)) {
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: reviewLabel, color: 'ff9f1c', description: 'Meta self-check requires human review' });
            }

            // Apply labels accordingly and remove the other label if present
            if (improved) {
              await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: [passLabel] });
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: reviewLabel }); } catch (e) {}
            } else {
              await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: [reviewLabel] });
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: passLabel }); } catch (e) {}
            }

          } catch (err) {
            const body = '**Meta self-validation results**\n\n_Error reading result file or parsing JSON_';
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
          }
